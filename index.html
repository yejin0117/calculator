<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=JetBrains+Mono:wght@500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calc">
    <div class="calc__device">
      <!-- 계산화면 -->
      <section class="calc__display" aria-label="계산 결과 화면">
        <p class="calc__expression" id="expression"></p>
        <p class="calc__result" id="result">0</p>
      </section>

      <!-- 키패드 -->
      <section class="calc__keys" aria-label="계산기 키패드">

        <button class="key" type="button" data-action="backspace">&rarr;</button>
        <button class="key" type="button" data-digit="7">7</button>
        <button class="key" type="button" data-digit="8">8</button>
        <button class="key" type="button" data-digit="9">9</button>
        <button class="key" type="button" data-op="/">&divide;</button>

        <button class="key" type="button" data-action="clear-entry">CE</button>
        <button class="key" type="button" data-digit="4">4</button>
        <button class="key" type="button" data-digit="5">5</button>
        <button class="key" type="button" data-digit="6">6</button>
        <button class="key" type="button" data-op="*">&times;</button>

        <button class="key" type="button" data-action="clear">AC</button>
        <button class="key" type="button" data-digit="1">1</button>
        <button class="key" type="button" data-digit="2">2</button>
        <button class="key" type="button" data-digit="3">3</button>
        <button class="key" type="button" data-op="-">&minus;</button>

        <button class="key" type="button" data-digit="0">0</button>
        <button class="key" type="button" data-digit="00">00</button>
        <button class="key" type="button" data-action="decimal">.</button>
        <button class="key key--equals" type="button" data-action="equals">=</button>
        <button class="key" type="button" data-op="+">+</button>
      </section>

      <!-- 연산 기록 저장/조회 -->
      <section class="calc__history">
        <button class="calc__history-toggle" type="button" id="historyToggle">
          계산 기록 <span class="calc__history-arrow" id="historyArrow">&#9662;</span>
        </button>
        <ul class="calc__history-list" id="historyList"></ul>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
